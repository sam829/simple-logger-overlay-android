name: Release

on:
  push:
    branches: [ main ]
    # Skip commits that the workflow itself creates to avoid infinite loops
    paths-ignore:
      - 'gradle.properties'

permissions:
  contents: write

jobs:
  release:
    name: Bump version, tag & publish
    runs-on: ubuntu-latest
    # Do not run on commits already tagged as a release
    if: "!contains(github.event.head_commit.message, '[skip ci]')"

    steps:
      - name: Checkout (full history for tagging)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v3

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      # ── Version bump ─────────────────────────────────────────────────────────
      - name: Calculate next patch version
        id: version
        run: |
          # Get latest tag; fall back to v0.0.0 on a fresh repo
          LATEST=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "Latest tag: $LATEST"

          # Strip leading 'v' and split
          VERSION=${LATEST#v}
          MAJOR=$(echo $VERSION | cut -d. -f1)
          MINOR=$(echo $VERSION | cut -d. -f2)
          PATCH=$(echo $VERSION | cut -d. -f3)

          # Bump patch
          NEW_PATCH=$((PATCH + 1))
          NEW_VERSION="$MAJOR.$MINOR.$NEW_PATCH"
          NEW_TAG="v$NEW_VERSION"

          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "new_tag=$NEW_TAG"         >> "$GITHUB_OUTPUT"
          echo "Next version: $NEW_VERSION"

      - name: Update gradle.properties
        run: |
          sed -i "s/^VERSION=.*/VERSION=${{ steps.version.outputs.new_version }}/" gradle.properties
          cat gradle.properties | grep VERSION

      - name: Commit version bump
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add gradle.properties
          git commit -m "chore: release ${{ steps.version.outputs.new_tag }} [skip ci]"

      - name: Create and push tag
        run: |
          git tag ${{ steps.version.outputs.new_tag }}
          git push origin main --tags

      # ── Publish to Maven Central ──────────────────────────────────────────────
      - name: Publish to Maven Central
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.SIGNING_KEY_ID }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_SECRET_KEY_BASE64 }}
        run: |
          ./gradlew :library:publishAndReleaseToMavenCentral \
            --no-configuration-cache \
            --no-daemon

      # ── GitHub Release ────────────────────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.new_tag }}
          name: ${{ steps.version.outputs.new_tag }}
          generate_release_notes: true
