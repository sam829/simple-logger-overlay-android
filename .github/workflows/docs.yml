name: Docs

on:
  # Triggers after the Release workflow completes successfully.
  # workflow_run is used because tags created by GITHUB_TOKEN do not
  # trigger tag-based event triggers in other workflows.
  workflow_run:
    workflows: ["Release"]
    types: [completed]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-docs:
    name: Generate Dokka HTML
    runs-on: ubuntu-latest
    # Only run if the Release workflow succeeded
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v3

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Generate Dokka HTML
        run: ./gradlew :library:dokkaHtml --no-daemon

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: library/build/dokka/html

  deploy-docs:
    name: Deploy to GitHub Pages
    needs: build-docs
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
