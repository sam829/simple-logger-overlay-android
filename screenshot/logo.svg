<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#62C99A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3A9E70;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="panelGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2A2D36;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1C1F26;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <clipPath id="outerClip">
      <rect x="24" y="24" width="464" height="464" rx="104"/>
    </clipPath>
  </defs>

  <!-- Outer rounded square background -->
  <rect x="24" y="24" width="464" height="464" rx="104" fill="url(#bgGrad)"/>
  <rect x="24" y="24" width="464" height="464" rx="104" fill="none" stroke="#FFFFFF" stroke-width="1" opacity="0.08"/>

  <!-- Phone silhouette -->
  <rect x="156" y="80" width="200" height="330" rx="24" fill="url(#panelGrad)" filter="url(#shadow)"/>
  <!-- Phone notch/camera pill -->
  <rect x="218" y="92" width="76" height="14" rx="7" fill="#1A1D22"/>

  <!-- Screen area top bar -->
  <rect x="164" y="116" width="184" height="32" rx="4" fill="#323641"/>
  <!-- Back arrow -->
  <polyline points="178,132 188,124 188,140" fill="none" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>
  <!-- Title bar text lines -->
  <rect x="200" y="127" width="60" height="7" rx="3.5" fill="#FFFFFF" opacity="0.7"/>
  <rect x="200" y="138" width="40" height="5" rx="2.5" fill="#FFFFFF" opacity="0.3"/>
  <!-- Share icon -->
  <circle cx="328" cy="132" r="10" fill="#FFFFFF" opacity="0.1"/>
  <circle cx="322" cy="130" r="2.5" fill="#FFFFFF" opacity="0.6"/>
  <circle cx="334" cy="126" r="2.5" fill="#FFFFFF" opacity="0.6"/>
  <circle cx="334" cy="136" r="2.5" fill="#FFFFFF" opacity="0.6"/>
  <line x1="322" y1="130" x2="334" y2="126" stroke="#FFFFFF" stroke-width="1.5" opacity="0.6"/>
  <line x1="322" y1="130" x2="334" y2="136" stroke="#FFFFFF" stroke-width="1.5" opacity="0.6"/>

  <!-- Tabs: Logs / Network -->
  <rect x="164" y="148" width="184" height="28" rx="0" fill="#252830"/>
  <rect x="164" y="148" width="92" height="28" fill="#2A2D36"/>
  <rect x="164" y="172" width="92" height="3" rx="1.5" fill="#52B788"/>
  <text x="210" y="167" font-size="10" fill="#52B788" font-family="sans-serif" text-anchor="middle" font-weight="600">Logs (8)</text>
  <text x="302" y="167" font-size="10" fill="#FFFFFF" font-family="sans-serif" text-anchor="middle" opacity="0.5">Network (2)</text>

  <!-- Log row 1 — Debug (teal) -->
  <rect x="164" y="179" width="184" height="40" rx="0" fill="#FFFFFF" opacity="0.03"/>
  <circle cx="182" cy="199" r="7" fill="#40C9AA" opacity="0.2"/>
  <circle cx="182" cy="199" r="4" fill="#40C9AA"/>
  <rect x="196" y="193" width="100" height="7" rx="3.5" fill="#FFFFFF" opacity="0.75"/>
  <rect x="196" y="204" width="68" height="5" rx="2.5" fill="#FFFFFF" opacity="0.3"/>
  <polyline points="336,199 342,199" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
  <rect x="163" y="219" width="184" height="1" fill="#FFFFFF" opacity="0.05"/>

  <!-- Log row 2 — Info (blue) -->
  <rect x="164" y="220" width="184" height="40" rx="0" fill="#FFFFFF" opacity="0.03"/>
  <circle cx="182" cy="240" r="7" fill="#7CB8FF" opacity="0.2"/>
  <circle cx="182" cy="240" r="4" fill="#7CB8FF"/>
  <rect x="196" y="234" width="80" height="7" rx="3.5" fill="#FFFFFF" opacity="0.75"/>
  <rect x="196" y="245" width="52" height="5" rx="2.5" fill="#FFFFFF" opacity="0.3"/>
  <rect x="163" y="260" width="184" height="1" fill="#FFFFFF" opacity="0.05"/>

  <!-- Log row 3 — Warning (orange) -->
  <rect x="164" y="261" width="184" height="40" rx="0" fill="#FFB74D" opacity="0.05"/>
  <circle cx="182" cy="281" r="7" fill="#FFB74D" opacity="0.2"/>
  <circle cx="182" cy="281" r="4" fill="#FFB74D"/>
  <rect x="196" y="275" width="112" height="7" rx="3.5" fill="#FFFFFF" opacity="0.75"/>
  <rect x="196" y="286" width="76" height="5" rx="2.5" fill="#FFFFFF" opacity="0.3"/>
  <rect x="163" y="301" width="184" height="1" fill="#FFFFFF" opacity="0.05"/>

  <!-- Log row 4 — Error (red) -->
  <rect x="164" y="302" width="184" height="40" rx="0" fill="#FF6B6B" opacity="0.06"/>
  <circle cx="182" cy="322" r="7" fill="#FF6B6B" opacity="0.25"/>
  <circle cx="182" cy="322" r="4" fill="#FF8A80"/>
  <rect x="196" y="316" width="120" height="7" rx="3.5" fill="#FFFFFF" opacity="0.75"/>
  <rect x="196" y="327" width="84" height="5" rx="2.5" fill="#FFFFFF" opacity="0.3"/>
  <rect x="163" y="342" width="184" height="1" fill="#FFFFFF" opacity="0.05"/>

  <!-- Log row 5 — Verbose (grey) -->
  <rect x="164" y="343" width="184" height="40" rx="0" fill="#FFFFFF" opacity="0.02"/>
  <circle cx="182" cy="363" r="7" fill="#AAAAAA" opacity="0.2"/>
  <circle cx="182" cy="363" r="4" fill="#AAAAAA" opacity="0.6"/>
  <rect x="196" y="357" width="90" height="7" rx="3.5" fill="#FFFFFF" opacity="0.55"/>
  <rect x="196" y="368" width="60" height="5" rx="2.5" fill="#FFFFFF" opacity="0.25"/>

  <!-- FAB -->
  <circle cx="330" cy="378" r="26" fill="#52B788" filter="url(#shadow)"/>
  <circle cx="330" cy="378" r="26" fill="none" stroke="#FFFFFF" stroke-width="1.5" opacity="0.25"/>
  <!-- FAB hamburger lines -->
  <rect x="317" y="370" width="26" height="4" rx="2" fill="#FFFFFF"/>
  <rect x="317" y="378" width="20" height="4" rx="2" fill="#FFFFFF" opacity="0.75"/>
  <rect x="317" y="386" width="23" height="4" rx="2" fill="#FFFFFF" opacity="0.5"/>

  <!-- Home indicator -->
  <rect x="226" y="396" width="60" height="4" rx="2" fill="#FFFFFF" opacity="0.2"/>
</svg>
